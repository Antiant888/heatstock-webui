{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <!-- Card 1: Total News Today -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
            <div class="text-sm font-medium text-gray-500 dark:text-gray-400">Total News today</div>
            <div class="mt-1 text-3xl font-semibold text-gray-900 dark:text-white">{{ today_count }}</div>
        </div>
        
        <!-- Card 2: Top 3 Stocks -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
            <div class="text-sm font-medium text-gray-500 dark:text-gray-400">Top Stocks</div>
            <div class="mt-2 space-y-1" id="top-stocks-list">
                <!-- Populated by JavaScript -->
            </div>
        </div>
        
        <!-- Card 3: Top 3 Categories -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
            <div class="text-sm font-medium text-gray-500 dark:text-gray-400">Top Categories</div>
            <div class="mt-2 space-y-1" id="top-infos-list">
                <!-- Populated by JavaScript -->
            </div>
        </div>
        
        <!-- Card 4: Last Updated (Relative Time) -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
            <div class="text-sm font-medium text-gray-500 dark:text-gray-400">Last Updated</div>
            <div class="mt-1 text-lg font-semibold text-gray-900 dark:text-white">
                <span id="relative-time">N/A</span>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Top Stocks Chart -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Top 10 Stocks</h3>
            
            <!-- Market Filter Checkboxes -->
            <div class="mb-4" id="market-filters">
                <div class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Filter by Market:</div>
                <div class="flex flex-wrap gap-2" id="market-checkboxes">
                    <!-- Checkboxes will be populated by JavaScript -->
                </div>
            </div>
            
            <canvas id="stocksChart" height="200"></canvas>
        </div>
        
        <!-- Top Categories Chart -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Top 10 Info Categories</h3>
            <canvas id="infosChart" height="200"></canvas>
        </div>
    </div>

    <!-- Recent News -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow transition-colors duration-300">
        <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white">Recent News</h3>
        </div>
        <ul class="divide-y divide-gray-200 dark:divide-gray-700" id="recent-news-list">
            <!-- Populated by JavaScript -->
        </ul>
    </div>
</div>

<script>
// Parse all JSON data from backend with error handling
let dailyCounts = [];
let stockFrequency = [];
let infoFrequency = [];
let top3Stocks = [];
let top3Infos = [];
let recentNews = [];
let availableMarkets = [];
let marketStockData = {};
let expandedNewsId = null; // Track which news is currently expanded
let currentNewsData = recentNews; // Track current news data (filtered or unfiltered)

try {
    dailyCounts = JSON.parse('{{ daily_counts_json }}') || [];
} catch (e) {
    console.warn('Failed to parse dailyCounts:', e);
}

try {
    stockFrequency = JSON.parse('{{ stock_frequency_json }}') || [];
} catch (e) {
    console.warn('Failed to parse stockFrequency:', e);
}

try {
    infoFrequency = JSON.parse('{{ info_frequency_json }}') || [];
} catch (e) {
    console.warn('Failed to parse infoFrequency:', e);
}

try {
    top3Stocks = JSON.parse('{{ top_3_stocks_json }}') || [];
} catch (e) {
    console.warn('Failed to parse top3Stocks:', e);
}

try {
    top3Infos = JSON.parse('{{ top_3_infos_json }}') || [];
} catch (e) {
    console.warn('Failed to parse top3Infos:', e);
}

try {
    // Safely parse recentNews JSON - handle control characters
    let recentNewsJson = '{{ recent_news_json|safe }}';
    // Escape control characters that might break JSON parsing
    recentNewsJson = recentNewsJson.replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
    recentNews = recentNewsJson ? JSON.parse(recentNewsJson) : [];
} catch (e) {
    console.warn('Failed to parse recentNews:', e);
    recentNews = [];
}

// Update currentNewsData to point to the parsed recentNews array
currentNewsData = recentNews;

try {
    // Safely parse availableMarkets JSON - handle control characters
    let marketsJson = '{{ available_markets_json|safe }}';
    // Escape control characters that might break JSON parsing
    marketsJson = marketsJson.replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
    availableMarkets = marketsJson ? JSON.parse(marketsJson) : [];
} catch (e) {
    console.warn('Failed to parse availableMarkets:', e);
    availableMarkets = [];
}

try {
    marketStockData = JSON.parse('{{ market_stock_data_json }}') || {};
} catch (e) {
    console.warn('Failed to parse marketStockData:', e);
}

// Populate Top 3 Stocks
const topStocksList = document.getElementById('top-stocks-list');
if (top3Stocks && top3Stocks.length > 0) {
    topStocksList.innerHTML = top3Stocks.map(stock => `
        <div class="flex justify-between items-center">
            <div class="flex-1 min-w-0">
                <span class="text-sm font-medium text-gray-900 dark:text-white">${stock.code}</span>
                <span class="text-xs text-gray-500 dark:text-gray-400 ml-1 truncate">${stock.name ? '(' + stock.name + ')' : ''}</span>
            </div>
            <span class="text-xs text-gray-500 dark:text-gray-400 ml-2">${stock.frequency}</span>
        </div>
    `).join('');
} else {
    topStocksList.innerHTML = '<div class="text-sm text-gray-400 dark:text-gray-500">N/A</div>';
}

// Populate Top 3 Categories
const topInfosList = document.getElementById('top-infos-list');
if (top3Infos && top3Infos.length > 0) {
    topInfosList.innerHTML = top3Infos.map(info => `
        <div class="flex justify-between items-center">
            <span class="text-sm font-medium text-gray-900 dark:text-white truncate">${info.name}</span>
            <span class="text-xs text-gray-500 dark:text-gray-400">${info.frequency}</span>
        </div>
    `).join('');
} else {
    topInfosList.innerHTML = '<div class="text-sm text-gray-400 dark:text-gray-500">N/A</div>';
}

// Set relative time for the most recent news
if (recentNews && recentNews.length > 0 && recentNews[0].create_timestamp) {
    updateRelativeTime(recentNews[0].create_timestamp);
}

// Relative time calculation
function updateRelativeTime(timestamp) {
    const relativeTimeElement = document.getElementById('relative-time');
    if (!relativeTimeElement) return;
    
    const now = Date.now();
    const diff = now - (timestamp * 1000);
    
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    
    let relativeTime = '';
    
    if (days > 0) {
        relativeTime = days + ' day' + (days > 1 ? 's' : '') + ' ago';
    } else if (hours > 0) {
        relativeTime = hours + ' hour' + (hours > 1 ? 's' : '') + ' ago';
    } else if (minutes > 0) {
        relativeTime = minutes + ' min' + (minutes > 1 ? 's' : '') + ' ago';
    } else {
        relativeTime = 'Just now';
    }
    
    relativeTimeElement.textContent = relativeTime;
}

// Update relative time every minute
setInterval(() => {
    if (recentNews && recentNews.length > 0 && recentNews[0].create_timestamp) {
        updateRelativeTime(recentNews[0].create_timestamp);
    }
}, 60000);

// Stocks Chart - with error handling for canvas reuse
const stocksCanvas = document.getElementById('stocksChart');
let stocksChartInstance = null;
if (stocksCanvas) {
    // Check if chart already exists on this canvas
    const existingChart = Chart.getChart(stocksCanvas);
    if (existingChart) {
        existingChart.destroy();
    }
    
    const colors = window.getChartColors();
    stocksChartInstance = new Chart(stocksCanvas, {
        type: 'bar',
        data: {
            labels: stockFrequency.map(s => s.name ? `${s.code} (${s.name})` : s.code),
            datasets: [{
                label: 'Mentions',
                data: stockFrequency.map(s => s.frequency),
                backgroundColor: colors.stocks,
                borderColor: colors.stocksBorder,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            indexAxis: 'y',
            scales: {
                x: {
                    ticks: { color: colors.text },
                    grid: { color: colors.grid }
                },
                y: {
                    ticks: { color: colors.text },
                    grid: { color: colors.grid }
                }
            },
            plugins: {
                legend: {
                    labels: { color: colors.text }
                }
            }
        }
    });
}

// Infos Chart
let infosChartInstance = null;
const infosCanvas = document.getElementById('infosChart');
if (infosCanvas) {
    const existingInfosChart = Chart.getChart(infosCanvas);
    if (existingInfosChart) {
        existingInfosChart.destroy();
    }
    
    const colors = window.getChartColors();
    infosChartInstance = new Chart(infosCanvas, {
        type: 'bar',
        data: {
            labels: infoFrequency.map(i => i.name),
            datasets: [{
                label: 'Mentions',
                data: infoFrequency.map(i => i.frequency),
                backgroundColor: colors.infos,
                borderColor: colors.infosBorder,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            indexAxis: 'y',
            scales: {
                x: {
                    ticks: { color: colors.text },
                    grid: { color: colors.grid }
                },
                y: {
                    ticks: { color: colors.text },
                    grid: { color: colors.grid }
                }
            },
            plugins: {
                legend: {
                    labels: { color: colors.text }
                }
            },
            onClick: (event, elements) => {
                if (elements.length > 0) {
                    const index = elements[0].index;
                    const infoName = infoFrequency[index].name;
                    filterByInfo(infoName);
                }
            }
        }
    });
}

// Update chart colors when theme changes
window.addEventListener('themeChanged', function() {
    const colors = window.getChartColors();
    
    if (stocksChartInstance) {
        stocksChartInstance.data.datasets[0].backgroundColor = colors.stocks;
        stocksChartInstance.data.datasets[0].borderColor = colors.stocksBorder;
        stocksChartInstance.options.scales.x.ticks.color = colors.text;
        stocksChartInstance.options.scales.y.ticks.color = colors.text;
        stocksChartInstance.options.scales.x.grid.color = colors.grid;
        stocksChartInstance.options.scales.y.grid.color = colors.grid;
        stocksChartInstance.options.plugins.legend.labels.color = colors.text;
        stocksChartInstance.update();
    }
    
    if (infosChartInstance) {
        infosChartInstance.data.datasets[0].backgroundColor = colors.infos;
        infosChartInstance.data.datasets[0].borderColor = colors.infosBorder;
        infosChartInstance.options.scales.x.ticks.color = colors.text;
        infosChartInstance.options.scales.y.ticks.color = colors.text;
        infosChartInstance.options.scales.x.grid.color = colors.grid;
        infosChartInstance.options.scales.y.grid.color = colors.grid;
        infosChartInstance.options.plugins.legend.labels.color = colors.text;
        infosChartInstance.update();
    }
});

// Market Filter Functionality
let selectedMarkets = new Set();
let activeFilter = { type: null, value: null };
let currentStockData = stockFrequency; // Track currently displayed stock data

// Initialize market checkboxes
function initializeMarketCheckboxes() {
    const marketCheckboxesContainer = document.getElementById('market-checkboxes');
    if (!marketCheckboxesContainer || !availableMarkets || availableMarkets.length === 0) {
        return;
    }
    
    // Default markets to select (HK and US)
    const defaultMarkets = ['HK', 'US'];
    
    // Create checkboxes for each available market
    marketCheckboxesContainer.innerHTML = availableMarkets.map(market => `
        <label class="inline-flex items-center">
            <input type="checkbox" class="market-checkbox form-checkbox h-4 w-4 text-blue-600 dark:text-blue-400" 
                   value="${market}" ${defaultMarkets.includes(market) ? 'checked' : ''}>
            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">${market}</span>
        </label>
    `).join('');
    
    // Add event listeners to checkboxes
    const checkboxes = document.querySelectorAll('.market-checkbox');
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            if (this.checked) {
                selectedMarkets.add(this.value);
            } else {
                selectedMarkets.delete(this.value);
            }
            updateStocksChart();
        });
    });
    
    // Initialize with only default markets selected
    selectedMarkets = new Set(defaultMarkets.filter(market => availableMarkets.includes(market)));
}

// Update stocks chart based on selected markets
function updateStocksChart() {
    if (!stocksChartInstance) return;
    
    // Use market-specific data directly from backend
    let combinedData = [];
    
    if (selectedMarkets.size === availableMarkets.length) {
        // All markets selected - use the default stock frequency data
        combinedData = stockFrequency;
    } else {
        // Specific markets selected - combine data from selected markets
        selectedMarkets.forEach(market => {
            if (marketStockData[market]) {
                marketStockData[market].forEach(stock => {
                    combinedData.push({
                        code: stock.code,
                        name: stock.name,
                        market: stock.market,
                        frequency: stock.frequency
                    });
                });
            }
        });
        
        // Sort by frequency and take top 10
        combinedData.sort((a, b) => b.frequency - a.frequency);
        combinedData = combinedData.slice(0, 10);
    }
    
    // Update current stock data for click handler
    currentStockData = combinedData;
    
    // Update chart with code and name
    stocksChartInstance.data.labels = combinedData.map(s => s.name ? `${s.code} (${s.name})` : s.code);
    stocksChartInstance.data.datasets[0].data = combinedData.map(s => s.frequency);
    stocksChartInstance.update();
}


// Filter Recent News based on active filter
async function filterRecentNews() {
    let filteredNews = recentNews;
    
    // If a filter is active, fetch all filtered news from API
    if (activeFilter.type) {
        try {
            const params = new URLSearchParams();
            if (activeFilter.type === 'stock') {
                params.append('stock', activeFilter.value);
            } else if (activeFilter.type === 'info') {
                params.append('info', activeFilter.value);
            }
            
            const response = await fetch(`/api/news/today?${params.toString()}`);
            if (response.ok) {
                filteredNews = await response.json();
            } else {
                console.error('Failed to fetch filtered news');
                filteredNews = [];
            }
        } catch (error) {
            console.error('Error fetching filtered news:', error);
            filteredNews = [];
        }
    }
    
    // Update current news data for toggleNewsExpand to use
    currentNewsData = filteredNews;
    
    // Use the renderNewsList function to display filtered news
    renderNewsList(filteredNews);
}

// Toggle news expand (accordion-style - only one expanded at a time)
function toggleNewsExpand(newsId) {
    if (expandedNewsId === newsId) {
        // Clicking same item - collapse it
        expandedNewsId = null;
    } else {
        // Clicking different item - expand new one (old one collapses automatically)
        expandedNewsId = newsId;
    }
    // Re-render the news list with current news data (filtered or unfiltered)
    renderNewsList(currentNewsData);
}

// Render news list with expand/collapse functionality
function renderNewsList(newsData = recentNews) {
    const recentNewsList = document.getElementById('recent-news-list');
    if (!recentNewsList) return;
    
    // Render filter chip if filter is active
    let filterChipHtml = '';
    if (activeFilter.type) {
        const filterLabel = activeFilter.type === 'stock' ? 'Stock' : 'Category';
        filterChipHtml = `
            <div class="px-6 py-3 bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-gray-600 dark:text-gray-300">Filtered by ${filterLabel}:</span>
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium ${activeFilter.type === 'stock' ? 'bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200' : 'bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200'}">
                        ${activeFilter.value}
                        <button onclick="clearFilter()" class="ml-2 inline-flex items-center justify-center w-4 h-4 rounded-full hover:bg-opacity-20 hover:bg-gray-900 dark:hover:bg-gray-100">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </span>
                </div>
                <span class="text-sm text-gray-500 dark:text-gray-400">${newsData.length} news found</span>
            </div>
        `;
    }
    
    if (newsData && newsData.length > 0) {
        recentNewsList.innerHTML = filterChipHtml + newsData.map(news => {
            const isExpanded = expandedNewsId === news.id;
            const shouldTruncate = news.content && news.content.length > 100;
            const displayContent = isExpanded || !shouldTruncate 
                ? news.content 
                : (news.content || '').substring(0, 100) + '...';
            
            return `
                <li class="px-6 py-4">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-900 dark:text-white truncate">${news.title}</p>
                            <p class="text-sm text-gray-500 dark:text-gray-400 ${isExpanded ? '' : 'truncate'}">${displayContent}</p>
                            ${shouldTruncate ? `
                                <button onclick="toggleNewsExpand('${news.id}')" class="mt-1 text-xs text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium">
                                    ${isExpanded ? 'Show Less' : 'Read More'}
                                </button>
                            ` : ''}
                            <div class="mt-1 flex items-center space-x-2">
                                ${news.stocks.map(stock => `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 cursor-pointer hover:bg-blue-200 dark:hover:bg-blue-800" onclick="filterByStock('${stock}')">${stock}</span>`).join('')}
                                ${news.infos.map(info => `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200 cursor-pointer hover:bg-green-200 dark:hover:bg-green-800" onclick="filterByInfo('${info}')">${info}</span>`).join('')}
                            </div>
                        </div>
                        <div class="ml-4 flex-shrink-0 text-sm text-gray-500 dark:text-gray-400">
                            ${news.timestamp}
                        </div>
                    </div>
                </li>
            `;
        }).join('');
    } else {
        recentNewsList.innerHTML = filterChipHtml + '<li class="px-6 py-4 text-sm text-gray-400 dark:text-gray-500">No news matching this filter</li>';
    }
}

// Filter by stock code
function filterByStock(stockCode) {
    if (activeFilter.type === 'stock' && activeFilter.value === stockCode) {
        clearFilter();
    } else {
        activeFilter = { type: 'stock', value: stockCode };
        filterRecentNews();
        highlightSelectedBar('stock', stockCode);
    }
}

// Filter by info category
function filterByInfo(infoName) {
    if (activeFilter.type === 'info' && activeFilter.value === infoName) {
        clearFilter();
    } else {
        activeFilter = { type: 'info', value: infoName };
        filterRecentNews();
        highlightSelectedBar('info', infoName);
    }
}

// Clear active filter
function clearFilter() {
    activeFilter = { type: null, value: null };
    filterRecentNews();
    resetBarHighlights();
}

// Highlight selected bar in chart
function highlightSelectedBar(type, value) {
    const chart = type === 'stock' ? stocksChartInstance : infosChartInstance;
    if (!chart) return;
    
    const labels = chart.data.labels;
    // Find index by checking if label starts with value (handles "AAPL (Apple Inc.)" case)
    const index = labels.findIndex(label => label === value || label.startsWith(value + ' '));
    
    if (index !== -1) {
        const colors = window.getChartColors();
        const newColors = labels.map((_, i) => {
            if (i === index) {
                return type === 'stock' ? colors.stocksBorder : colors.infosBorder;
            }
            return type === 'stock' ? colors.stocks : colors.infos;
        });
        chart.data.datasets[0].backgroundColor = newColors;
        chart.update();
    }
}

// Reset bar highlights
function resetBarHighlights() {
    const colors = window.getChartColors();
    if (stocksChartInstance) {
        stocksChartInstance.data.datasets[0].backgroundColor = colors.stocks;
        stocksChartInstance.update();
    }
    if (infosChartInstance) {
        infosChartInstance.data.datasets[0].backgroundColor = colors.infos;
        infosChartInstance.update();
    }
}

// Initialize everything when DOM is loaded
document.addEventListener('DOMContentLoaded', function() {
    initializeMarketCheckboxes();
    renderNewsList(); // Render initial news with expand/collapse functionality
});
</script>
{% endblock %}
