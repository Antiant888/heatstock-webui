{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Info Frequency Chart -->
    <div class="bg-white rounded-lg shadow p-6">
        <h3 class="text-lg font-medium text-gray-900 mb-4">Info Category Frequency (Top 50)</h3>
        <canvas id="infoChart" height="400"></canvas>
    </div>

    <!-- Info Frequency Table -->
    <div class="bg-white rounded-lg shadow">
        <div class="px-6 py-4 border-b border-gray-200">
            <h3 class="text-lg font-medium text-gray-900">Info Category Frequency Table</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rank</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category Name</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Frequency</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Action</th>
                    </tr>
                </thead>
                <tbody id="infoTableBody" class="bg-white divide-y divide-gray-200">
                    <!-- Table rows will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Info frequency data from backend
const infoFrequency = JSON.parse('{{ info_frequency|safe }}');

// Render chart
new Chart(document.getElementById('infoChart'), {
    type: 'bar',
    data: {
        labels: infoFrequency.map(i => i.name),
        datasets: [{
            label: 'Mentions',
            data: infoFrequency.map(i => i.frequency),
            backgroundColor: 'rgba(16, 185, 129, 0.7)',
            borderColor: 'rgba(16, 185, 129, 1)',
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        indexAxis: 'y',
        scales: {
            x: { beginAtZero: true }
        },
        plugins: {
            legend: { display: false }
        }
    }
});

// Render table
const tableBody = document.getElementById('infoTableBody');
infoFrequency.forEach((info, index) => {
    const row = document.createElement('tr');
    row.innerHTML = `
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${index + 1}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${info.name}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${info.frequency}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm">
            <a href="/news?info=${encodeURIComponent(info.name)}" class="text-green-600 hover:text-green-900">View News</a>
        </td>
    `;
    tableBody.appendChild(row);
});
</script>
{% endblock %}
