{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Stock Frequency Cloud -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Stock Frequency (Today's News)</h3>
        <div id="stockCloud" class="flex flex-wrap gap-3">
            <!-- Hashtags will be populated by JavaScript -->
        </div>
    </div>
</div>

<script>
// Stock frequency data from backend
const stockFrequency = JSON.parse('{{ stock_frequency_json|safe }}');

// Render hashtag cloud
function renderStockCloud() {
    const cloudContainer = document.getElementById('stockCloud');
    
    if (!stockFrequency || stockFrequency.length === 0) {
        cloudContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-400">No stock data available for today</p>';
        return;
    }
    
    cloudContainer.innerHTML = stockFrequency.map(stock => `
        <a href="/news?stock=${stock.code}" 
           class="inline-flex items-center px-4 py-2 rounded-full text-sm font-medium 
                  bg-gray-100 dark:bg-gray-700 
                  text-gray-800 dark:text-gray-200 
                  hover:bg-green-100 dark:hover:bg-green-900 
                  hover:text-green-800 dark:hover:text-green-200
                  transition-all duration-200 
                  hover:scale-105 hover:shadow-md">
            ${stock.code} ${stock.name} (${stock.frequency})
        </a>
    `).join('');
}

// Initial render
renderStockCloud();
</script>
{% endblock %}
