{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Market Filter -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Filter by Market</h3>
        <div id="marketCheckboxes" class="flex flex-wrap gap-3">
            <!-- Checkboxes will be populated by JavaScript -->
        </div>
    </div>

    <!-- Stock Frequency Cloud -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Stock Frequency (Today's News)</h3>
        <div id="stockCloud" class="flex flex-wrap gap-3">
            <!-- Hashtags will be populated by JavaScript -->
        </div>
    </div>

    <!-- News Feed Section -->
    <div class="space-y-6">
        <!-- Filters -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Filters</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Search</label>
                    <input type="text" id="searchInput" placeholder="Search title or content..." 
                        class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Stock Code</label>
                    <input type="text" id="stockFilter" placeholder="e.g., 09698" 
                        class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm">
                </div>
            </div>
            <div class="mt-4">
                <button onclick="applyFilters()" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                    Apply Filters
                </button>
                <button onclick="clearFilters()" class="ml-2 inline-flex items-center px-4 py-2 border border-gray-300 dark:border-gray-600 text-sm font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                    Clear
                </button>
            </div>
        </div>

        <!-- News List -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow transition-colors duration-300">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-lg font-medium text-gray-900 dark:text-white">News Feed</h3>
                <span id="totalCount" class="text-sm text-gray-500 dark:text-gray-400"></span>
            </div>
            <!-- Active Filter Indicator -->
            <div id="activeFilterIndicator" class="hidden px-6 py-3 bg-blue-50 dark:bg-blue-900/20 border-b border-blue-200 dark:border-blue-800">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-2">
                        <span class="text-sm text-blue-700 dark:text-blue-300">Filtered by:</span>
                        <span id="activeFilterValue" class="inline-flex items-center px-2 py-1 rounded-full text-sm font-medium bg-blue-100 dark:bg-blue-800 text-blue-800 dark:text-blue-200"></span>
                    </div>
                    <button onclick="clearActiveFilter()" class="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-200 text-sm font-medium">
                        Clear Filter
                    </button>
                </div>
            </div>
            <div id="newsContainer" class="divide-y divide-gray-200 dark:divide-gray-700">
                <!-- News items will be loaded here -->
            </div>
        </div>

        <!-- Pagination -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow px-6 py-4 transition-colors duration-300">
            <div class="flex items-center justify-between">
                <div class="text-sm text-gray-700 dark:text-gray-300">
                    Showing <span id="showingFrom">0</span> to <span id="showingTo">0</span> of <span id="totalItems">0</span> results
                </div>
                <div class="flex space-x-2">
                    <button onclick="previousPage()" id="prevBtn" class="inline-flex items-center px-4 py-2 border border-gray-300 dark:border-gray-600 text-sm font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed">
                        Previous
                    </button>
                    <span id="pageInfo" class="inline-flex items-center px-4 py-2 text-sm text-gray-700 dark:text-gray-300"></span>
                    <button onclick="nextPage()" id="nextBtn" class="inline-flex items-center px-4 py-2 border border-gray-300 dark:border-gray-600 text-sm font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed">
                        Next
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Data from backend with error handling
let stockFrequency = [];
let availableMarkets = [];
let marketStockData = {};

try {
    stockFrequency = JSON.parse('{{ stock_frequency_json }}') || [];
} catch (e) {
    console.warn('Failed to parse stockFrequency:', e);
}

try {
    availableMarkets = JSON.parse('{{ available_markets_json }}') || [];
} catch (e) {
    console.warn('Failed to parse availableMarkets:', e);
}

try {
    marketStockData = JSON.parse('{{ market_stock_data_json }}') || {};
} catch (e) {
    console.warn('Failed to parse marketStockData:', e);
}

// Default markets (HK and US)
let selectedMarkets = new Set(['HK', 'US'].filter(m => availableMarkets.includes(m)));

// Get color based on market (Option A: Low Opacity)
function getMarketColor(market) {
    const colors = {
        'HK': 'bg-green-500/20 dark:bg-green-500/30 text-black dark:text-white',
        'US': 'bg-blue-500/20 dark:bg-blue-500/30 text-blue-700 dark:text-blue-300',
        'CN': 'bg-green-500/20 dark:bg-green-500/30 text-green-700 dark:text-green-300',
        'default': 'bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200'
    };
    return colors[market] || colors['default'];
}

// Initialize market checkboxes
function initializeMarketCheckboxes() {
    const container = document.getElementById('marketCheckboxes');
    
    if (!availableMarkets || availableMarkets.length === 0) {
        container.innerHTML = '<p class="text-gray-500 dark:text-gray-400">No markets available</p>';
        return;
    }
    
    container.innerHTML = availableMarkets.map(market => `
        <label class="inline-flex items-center cursor-pointer">
            <input type="checkbox" 
                   class="market-checkbox form-checkbox h-5 w-5 text-green-600 dark:text-green-400 rounded border-gray-300 dark:border-gray-600 focus:ring-green-500"
                   value="${market}" 
                   ${selectedMarkets.has(market) ? 'checked' : ''}>
            <span class="ml-2 text-sm font-medium text-gray-700 dark:text-gray-300">${market}</span>
        </label>
    `).join('');
    
    // Add event listeners
    const checkboxes = container.querySelectorAll('.market-checkbox');
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            if (this.checked) {
                selectedMarkets.add(this.value);
            } else {
                selectedMarkets.delete(this.value);
            }
            updateStockCloud();
        });
    });
}

// Update stock cloud based on selected markets
function updateStockCloud() {
    const cloudContainer = document.getElementById('stockCloud');
    
    if (selectedMarkets.size === 0) {
        cloudContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-400">Please select at least one market</p>';
        return;
    }
    
    // Combine stocks from selected markets
    let combinedStocks = [];
    selectedMarkets.forEach(market => {
        if (marketStockData[market]) {
            combinedStocks = combinedStocks.concat(marketStockData[market]);
        }
    });
    
    // Sort by frequency and take top 50
    combinedStocks.sort((a, b) => b.frequency - a.frequency);
    const top50Stocks = combinedStocks.slice(0, 50);
    
    if (top50Stocks.length === 0) {
        cloudContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-400">No stock data available for selected markets</p>';
        return;
    }
    
    cloudContainer.innerHTML = top50Stocks.map(stock => `
        <a href="javascript:void(0)" 
           onclick="filterByStock('${stock.code}')"
           class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium 
                  ${getMarketColor(stock.market)}
                  hover:opacity-80
                  transition-all duration-200 
                  hover:scale-105 hover:shadow-md cursor-pointer">
            ${stock.code} ${stock.name} (${stock.frequency})
        </a>
    `).join('');
}

// News Feed Variables
let currentPage = 1;
const pageSize = 20;
let expandedNewsId = null; // Track which news is currently expanded
let currentNewsData = []; // Track current news data
let activeFilter = { type: null, value: null }; // Track active filter

// Load news on page load
document.addEventListener('DOMContentLoaded', function() {
    initializeMarketCheckboxes();
    updateStockCloud();
    loadNews();
});

async function loadNews() {
    const search = document.getElementById('searchInput').value;
    const stock = document.getElementById('stockFilter').value;

    const params = new URLSearchParams({
        page: currentPage,
        page_size: pageSize
    });

    if (search) params.append('search', search);
    if (stock) params.append('stock', stock);

    try {
        const response = await fetch(`/api/news?${params}`);
        const data = await response.json();
        
        // Store current news data for expand/collapse functionality
        currentNewsData = data.items;
        renderNews(data.items);
        updatePagination(data);
    } catch (error) {
        console.error('Error loading news:', error);
    }
}

function renderNews(items) {
    const container = document.getElementById('newsContainer');
    container.innerHTML = '';

    if (items.length === 0) {
        container.innerHTML = '<div class="px-6 py-4 text-center text-gray-500 dark:text-gray-400">No news found</div>';
        return;
    }

    items.forEach(item => {
        const isExpanded = expandedNewsId === item.id;
        const shouldTruncate = item.content && item.content.length > 100;
        const displayContent = isExpanded || !shouldTruncate 
            ? item.content 
            : (item.content || '').substring(0, 100) + '...';

        const stocksHtml = item.stocks.map(s => 
            `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 cursor-pointer hover:bg-blue-200 dark:hover:bg-blue-800" onclick="filterByStock('${s}')">${s}</span>`
        ).join('');

        const infosHtml = item.infos.map(i => 
            `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200 cursor-pointer hover:bg-green-200 dark:hover:bg-green-800" onclick="filterByInfo('${i}')">${i}</span>`
        ).join('');

        const html = `
            <div class="px-6 py-4 hover:bg-gray-50 dark:hover:bg-gray-700">
                <div class="flex items-start justify-between">
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-medium text-gray-900 dark:text-white">${item.title || 'Untitled'}</h4>
                        <p class="mt-1 text-sm text-gray-600 dark:text-gray-400 ${isExpanded ? '' : 'line-clamp-2'}">${displayContent}</p>
                        ${shouldTruncate ? `
                            <button onclick="toggleNewsExpand('${item.id}')" class="mt-1 text-xs text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium">
                                ${isExpanded ? 'Show Less' : 'Read More'}
                            </button>
                        ` : ''}
                        <div class="mt-2 flex flex-wrap gap-1">
                            ${stocksHtml}
                            ${infosHtml}
                        </div>
                    </div>
                    <div class="ml-4 flex-shrink-0 text-sm text-gray-500 dark:text-gray-400 whitespace-nowrap">
                        ${item.timestamp}
                    </div>
                </div>
                ${item.route ? `<a href="${item.route}" target="_blank" class="mt-2 inline-flex items-center text-sm text-green-600 dark:text-green-400 hover:text-green-500 dark:hover:text-green-300">View on Gelonghui →</a>` : ''}
            </div>
        `;
        container.innerHTML += html;
    });
}

function updatePagination(data) {
    const from = (data.page - 1) * data.page_size + 1;
    const to = Math.min(data.page * data.page_size, data.total);

    document.getElementById('showingFrom').textContent = data.total > 0 ? from : 0;
    document.getElementById('showingTo').textContent = to;
    document.getElementById('totalItems').textContent = data.total;
    document.getElementById('totalCount').textContent = `${data.total} items`;
    document.getElementById('pageInfo').textContent = `Page ${data.page} of ${data.total_pages}`;

    document.getElementById('prevBtn').disabled = data.page <= 1;
    document.getElementById('nextBtn').disabled = data.page >= data.total_pages;
}

function previousPage() {
    if (currentPage > 1) {
        currentPage--;
        loadNews();
    }
}

function nextPage() {
    currentPage++;
    loadNews();
}

function applyFilters() {
    currentPage = 1;
    loadNews();
}

function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('stockFilter').value = '';
    currentPage = 1;
    loadNews();
}

// Toggle news expand (accordion-style - only one expanded at a time)
function toggleNewsExpand(newsId) {
    if (expandedNewsId === newsId) {
        // Clicking same item - collapse it
        expandedNewsId = null;
    } else {
        // Clicking different item - expand new one (old one collapses automatically)
        expandedNewsId = newsId;
    }
    // Re-render the news list with current news data
    renderNews(currentNewsData);
}

// Filter by stock code (called when clicking stock in hashtag cloud)
function filterByStock(stockCode) {
    document.getElementById('stockFilter').value = stockCode;
    currentPage = 1;
    expandedNewsId = null; // Reset expanded state when filtering
    
    // Update active filter
    activeFilter = { type: 'stock', value: stockCode };
    updateFilterIndicator();
    highlightActiveHashtag();
    
    loadNews();
    
    // Scroll to news feed section
    document.querySelector('#newsContainer').scrollIntoView({ behavior: 'smooth' });
}

// Filter by info category (called when clicking info tag)
function filterByInfo(infoName) {
    document.getElementById('searchInput').value = infoName;
    currentPage = 1;
    expandedNewsId = null; // Reset expanded state when filtering
    
    // Update active filter
    activeFilter = { type: 'info', value: infoName };
    updateFilterIndicator();
    highlightActiveHashtag();
    
    loadNews();
    
    // Scroll to news feed section
    document.querySelector('#newsContainer').scrollIntoView({ behavior: 'smooth' });
}

// Update filter indicator
function updateFilterIndicator() {
    const indicator = document.getElementById('activeFilterIndicator');
    const filterValue = document.getElementById('activeFilterValue');
    
    if (activeFilter.type) {
        indicator.classList.remove('hidden');
        filterValue.textContent = `${activeFilter.type === 'stock' ? 'Stock' : 'Search'}: ${activeFilter.value}`;
    } else {
        indicator.classList.add('hidden');
    }
}

// Clear active filter
function clearActiveFilter() {
    activeFilter = { type: null, value: null };
    document.getElementById('searchInput').value = '';
    document.getElementById('stockFilter').value = '';
    currentPage = 1;
    expandedNewsId = null;
    
    updateFilterIndicator();
    highlightActiveHashtag();
    loadNews();
}

// Highlight active hashtag in stock cloud
function highlightActiveHashtag() {
    const cloudContainer = document.getElementById('stockCloud');
    const hashtags = cloudContainer.querySelectorAll('a');
    
    hashtags.forEach(hashtag => {
        // Remove existing active classes
        hashtag.classList.remove('ring-2', 'ring-blue-500', 'ring-offset-2');
        
        // Add active class if this is the filtered stock
        if (activeFilter.type === 'stock') {
            const stockCode = hashtag.textContent.match(/^(\d+\.[A-Z]+)/)?.[1];
            if (stockCode === activeFilter.value) {
                hashtag.classList.add('ring-2', 'ring-blue-500', 'ring-offset-2');
            }
        }
    });
}

// Update applyFilters to track active filter
function applyFilters() {
    const search = document.getElementById('searchInput').value;
    const stock = document.getElementById('stockFilter').value;
    
    currentPage = 1;
    expandedNewsId = null;
    
    // Update active filter based on which field has value
    if (stock) {
        activeFilter = { type: 'stock', value: stock };
    } else if (search) {
        activeFilter = { type: 'info', value: search };
    } else {
        activeFilter = { type: null, value: null };
    }
    
    updateFilterIndicator();
    highlightActiveHashtag();
    loadNews();
}

// Update clearFilters to clear active filter
function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('stockFilter').value = '';
    currentPage = 1;
    expandedNewsId = null;
    
    activeFilter = { type: null, value: null };
    updateFilterIndicator();
    highlightActiveHashtag();
    
    loadNews();
}
</script>
{% endblock %}
