{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Market Filter -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Filter by Market</h3>
        <div id="marketCheckboxes" class="flex flex-wrap gap-3">
            <!-- Checkboxes will be populated by JavaScript -->
        </div>
    </div>

    <!-- Stock Frequency Cloud -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 transition-colors duration-300">
        <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Stock Frequency (Today's News)</h3>
        <div id="stockCloud" class="flex flex-wrap gap-3">
            <!-- Hashtags will be populated by JavaScript -->
        </div>
    </div>

    <!-- All-Time News Section -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow transition-colors duration-300">
        <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white">All-Time News</h3>
            <button id="newsRefreshBtn" onclick="refreshAllTimeNews()" class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-colors duration-200">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                Refresh
            </button>
        </div>
        <div id="allTimeNewsList" class="divide-y divide-gray-200 dark:divide-gray-700">
            <!-- News items will be populated by JavaScript -->
        </div>
        <!-- Pagination -->
        <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-700 flex justify-between items-center">
            <div class="text-sm text-gray-500 dark:text-gray-400">
                Showing <span id="showingFrom">0</span> to <span id="showingTo">0</span> of <span id="totalItems">0</span> results
            </div>
            <div class="flex space-x-2">
                <button onclick="previousPage()" id="prevBtn" class="inline-flex items-center px-3 py-1.5 border border-gray-300 dark:border-gray-600 text-xs font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed">
                    Previous
                </button>
                <span id="pageInfo" class="inline-flex items-center px-3 py-1.5 text-xs text-gray-700 dark:text-gray-300"></span>
                <button onclick="nextPage()" id="nextBtn" class="inline-flex items-center px-3 py-1.5 border border-gray-300 dark:border-gray-600 text-xs font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed">
                    Next
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Data from backend with error handling
let stockFrequency = [];
let availableMarkets = [];
let marketStockData = {};

try {
    stockFrequency = JSON.parse('{{ stock_frequency_json }}') || [];
} catch (e) {
    console.warn('Failed to parse stockFrequency:', e);
}

try {
    availableMarkets = JSON.parse('{{ available_markets_json }}') || [];
} catch (e) {
    console.warn('Failed to parse availableMarkets:', e);
}

try {
    marketStockData = JSON.parse('{{ market_stock_data_json }}') || {};
} catch (e) {
    console.warn('Failed to parse marketStockData:', e);
}

// Default markets (HK and US)
let selectedMarkets = new Set(['HK', 'US'].filter(m => availableMarkets.includes(m)));

// Get color based on market (Option A: Low Opacity)
function getMarketColor(market) {
    const colors = {
        'HK': 'bg-green-500/20 dark:bg-green-500/30 text-black dark:text-white',
        'US': 'bg-blue-500/20 dark:bg-blue-500/30 text-blue-700 dark:text-blue-300',
        'CN': 'bg-green-500/20 dark:bg-green-500/30 text-green-700 dark:text-green-300',
        'default': 'bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200'
    };
    return colors[market] || colors['default'];
}

// Initialize market checkboxes
function initializeMarketCheckboxes() {
    const container = document.getElementById('marketCheckboxes');
    
    if (!availableMarkets || availableMarkets.length === 0) {
        container.innerHTML = '<p class="text-gray-500 dark:text-gray-400">No markets available</p>';
        return;
    }
    
    container.innerHTML = availableMarkets.map(market => `
        <label class="inline-flex items-center cursor-pointer">
            <input type="checkbox" 
                   class="market-checkbox form-checkbox h-5 w-5 text-green-600 dark:text-green-400 rounded border-gray-300 dark:border-gray-600 focus:ring-green-500"
                   value="${market}" 
                   ${selectedMarkets.has(market) ? 'checked' : ''}>
            <span class="ml-2 text-sm font-medium text-gray-700 dark:text-gray-300">${market}</span>
        </label>
    `).join('');
    
    // Add event listeners
    const checkboxes = container.querySelectorAll('.market-checkbox');
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            if (this.checked) {
                selectedMarkets.add(this.value);
            } else {
                selectedMarkets.delete(this.value);
            }
            updateStockCloud();
        });
    });
}

// Update stock cloud based on selected markets
function updateStockCloud() {
    const cloudContainer = document.getElementById('stockCloud');
    
    if (selectedMarkets.size === 0) {
        cloudContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-400">Please select at least one market</p>';
        return;
    }
    
    // Combine stocks from selected markets
    let combinedStocks = [];
    selectedMarkets.forEach(market => {
        if (marketStockData[market]) {
            combinedStocks = combinedStocks.concat(marketStockData[market]);
        }
    });
    
    // Sort by frequency and take top 50
    combinedStocks.sort((a, b) => b.frequency - a.frequency);
    const top50Stocks = combinedStocks.slice(0, 50);
    
    if (top50Stocks.length === 0) {
        cloudContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-400">No stock data available for selected markets</p>';
        return;
    }
    
    cloudContainer.innerHTML = top50Stocks.map(stock => `
        <a href="/news?stock=${stock.code}" 
           class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium 
                  ${getMarketColor(stock.market)}
                  hover:opacity-80
                  transition-all duration-200 
                  hover:scale-105 hover:shadow-md cursor-pointer">
            ${stock.code} ${stock.name} (${stock.frequency})
        </a>
    `).join('');
}

// Pagination variables
let currentPage = 1;
const pageSize = 10;
let allTimeNews = [];

// Render all-time news list with pagination
function renderAllTimeNewsList() {
    const newsList = document.getElementById('allTimeNewsList');
    
    if (!allTimeNews || allTimeNews.length === 0) {
        newsList.innerHTML = '<p class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400">No news available</p>';
        updatePagination(0);
        return;
    }
    
    const startIndex = (currentPage - 1) * pageSize;
    const endIndex = startIndex + pageSize;
    const paginatedNews = allTimeNews.slice(startIndex, endIndex);
    
    newsList.innerHTML = paginatedNews.map(news => `
        <div class="px-6 py-4 hover:bg-gray-50 dark:hover:bg-gray-700">
            <div class="flex items-start justify-between">
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 dark:text-white truncate">${news.title}</p>
                    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 line-clamp-2">${(news.content || '').substring(0, 150)}...</p>
                    <div class="mt-2 flex flex-wrap gap-1">
                        ${news.stocks.map(stock => `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200">${stock}</span>`).join('')}
                        ${news.infos.map(info => `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200">${info}</span>`).join('')}
                    </div>
                </div>
                <div class="ml-4 flex-shrink-0 text-sm text-gray-500 dark:text-gray-400">
                    ${news.timestamp}
                </div>
            </div>
        </div>
    `).join('');
    
    updatePagination(allTimeNews.length);
}

// Update pagination display
function updatePagination(total) {
    const from = total > 0 ? (currentPage - 1) * pageSize + 1 : 0;
    const to = Math.min(currentPage * pageSize, total);
    const totalPages = Math.ceil(total / pageSize);
    
    document.getElementById('showingFrom').textContent = from;
    document.getElementById('showingTo').textContent = to;
    document.getElementById('totalItems').textContent = total;
    document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages || 1}`;
    
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
}

// Previous page
function previousPage() {
    if (currentPage > 1) {
        currentPage--;
        renderAllTimeNewsList();
    }
}

// Next page
function nextPage() {
    const totalPages = Math.ceil(allTimeNews.length / pageSize);
    if (currentPage < totalPages) {
        currentPage++;
        renderAllTimeNewsList();
    }
}

// Refresh all-time news
async function refreshAllTimeNews() {
    const refreshBtn = document.getElementById('newsRefreshBtn');
    const refreshIcon = refreshBtn.querySelector('svg');
    
    // Show loading state
    refreshBtn.disabled = true;
    refreshIcon.classList.add('animate-spin');
    
    try {
        const response = await fetch('/api/news');
        if (!response.ok) {
            throw new Error('Refresh failed');
        }
        
        const data = await response.json();
        
        // Update news list
        allTimeNews.length = 0;
        allTimeNews.push(...data.items);
        currentPage = 1;
        renderAllTimeNewsList();
        
        // Show success feedback
        refreshBtn.classList.add('bg-green-700');
        setTimeout(() => {
            refreshBtn.classList.remove('bg-green-700');
        }, 1000);
        
    } catch (error) {
        console.error('Refresh error:', error);
        alert('Refresh failed. Please try again.');
    } finally {
        // Reset button state
        refreshBtn.disabled = false;
        refreshIcon.classList.remove('animate-spin');
    }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    initializeMarketCheckboxes();
    updateStockCloud();
    renderAllTimeNewsList();
});
</script>
{% endblock %}
